<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이디/비밀번호 찾기 - STAYFOLIO</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/sub.css" />
</head>
<body class="sub">

  <header id="header">
    <div class="inner header-inner">
      <h1 class="logo"><a href="index.html"><img src="images/logo.png" alt="STAY FOLIO" /></a></h1>
      <nav class="gnb">
        <ul>
          <li><a href="find-stay.html">FIND STAY</a></li>
          <li><a href="promotion.html">PROMOTION</a></li>
          <li><a href="journal.html">JOURNAL</a></li>
          <li><a href="pre-order.html">PRE-ORDER</a></li>
        </ul>
      </nav>
      <div class="header-util">
        <a href="search.html" class="util-btn" aria-label="검색">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="16.5" y1="16.5" x2="21" y2="21"></line></svg>
        </a>
        <span class="util-divider"></span>
        <a href="login.html" class="util-btn" aria-label="마이페이지">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"></circle><circle cx="12" cy="10" r="3"></circle><path d="M6.5 19a7 7 0 0 1 11 0"></path></svg>
        </a>
      </div>
    </div>
  </header>

  <section class="auth-wrap">
    <div class="auth-card">
      <p class="logo-mark"><img src="images/logo.png" alt="STAY FOLIO" style="filter:brightness(0)" /></p>
      <h1>아이디/비밀번호 찾기</h1>
      <p class="sub">가입 정보로 계정을 다시 찾아드려요.</p>

      <div class="auth-tabs" id="findTabs">
        <button type="button" class="active" data-tab="id">아이디 찾기</button>
        <button type="button" data-tab="pw">비밀번호 찾기</button>
      </div>

      <!-- 아이디 찾기 -->
      <div class="auth-pane active" data-pane="id">
        <form data-demo>
          <div class="auth-field">
            <label>이름</label>
            <input type="text" placeholder="가입자 이름" />
          </div>
          <div class="auth-field">
            <label>휴대폰 번호</label>
            <input type="tel" placeholder="'-' 없이 숫자만 입력" />
          </div>
          <button type="submit" class="btn-primary" style="margin-top:26px">아이디 찾기</button>
        </form>
        <p class="auth-hint">가입 시 등록한 이름과 휴대폰 번호로 아이디(이메일)를 안내해 드립니다.</p>
      </div>

      <!-- 비밀번호 찾기 -->
      <div class="auth-pane" data-pane="pw">
        <form data-demo>
          <div class="auth-field">
            <label>아이디(이메일)</label>
            <input type="email" placeholder="email@example.com" />
          </div>
          <button type="submit" class="btn-primary" style="margin-top:26px">재설정 메일 보내기</button>
        </form>
        <p class="auth-hint">입력하신 이메일로 비밀번호 재설정 링크를 보내드립니다.</p>
      </div>

      <p class="auth-foot">계정이 기억나셨나요? <a href="login.html">로그인</a></p>
    </div>
  </section>

  <script src="js/sub.js"></script>
  <script>
    (function () {
      const tabs = document.querySelectorAll('#findTabs button');
      const panes = document.querySelectorAll('.auth-pane');
      tabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          tabs.forEach((t) => t.classList.remove('active'));
          tab.classList.add('active');
          const key = tab.dataset.tab;
          panes.forEach((p) => p.classList.toggle('active', p.dataset.pane === key));
        });
      });
    })();
  </script>
</body>
</html>
